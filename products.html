<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products | Hsu Tharaphu</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary-green: #2ecc71; --dark: #1d1d1f; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: #fff; color: var(--dark); }
        
        nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); position: fixed; top: 0; width: 100%; z-index: 1000; display: flex; justify-content: center; padding: 15px 0; }
        nav a { color: var(--dark); text-decoration: none; font-size: 14px; margin: 0 20px; }

        .container { max-width: 1100px; margin: 100px auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        
        .product-card { background: #f5f5f7; border-radius: 20px; padding: 40px; text-align: center; transition: 0.4s; }
        .product-card:hover { transform: scale(1.02); background: #f2f2f2; }
        .product-card h3 { font-size: 1.8rem; margin: 10px 0; }
        .product-card p { color: #86868b; }
        .btn { background: var(--primary-green); color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>
    <nav><a href="index.html">Home</a><a href="about.html">About</a><a href="products.html">Products</a><a href="contact.html">Contact</a></nav>

    <div class="container">
        <h2 style="font-size: 3rem; text-align: center; margin-bottom: 50px;">Our Portfolio.</h2>
        <div class="grid">
            <div class="product-card">
                <h3>Solar Solutions</h3>
                <p>Sustainable energy for a brighter tomorrow.</p>
                <button class="btn">Explore</button>
            </div>
            <div class="product-card">
                <h3>CCTV & Security</h3>
                <p>Advanced protection for your assets.</p>
                <button class="btn">Explore</button>
            </div>
            <div class="product-card" style="background: var(--dark); color: white;">
                <h3 style="color: var(--primary-green);">Chemicals</h3>
                <p style="color: #86868b;">Industrial grade raw materials.</p>
                <button class="btn">Explore</button>
            </div>
        </div>
    </div>
</body>
</html>
